name: Build Release Artifacts

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            npm_script: build:windows
          - os: ubuntu-22.04
            npm_script: build:linux-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
          # Ustaw w repo → Settings → Secrets → LAUNCHER_MODS_API_KEY (nie commituj klucza).
          LAUNCHER_MODS_API_KEY: ${{ secrets.LAUNCHER_MODS_API_KEY }}
        run: npm run ${{ matrix.npm_script }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  arch-package:
    name: Arch Package Skeleton
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Arch package metadata
        run: |
          chmod +x scripts/generate-arch-package.sh
          scripts/generate-arch-package.sh

      - name: Upload Arch packaging files
        uses: actions/upload-artifact@v4
        with:
          name: arch-package-skeleton
          path: packaging/arch/out/**
          if-no-files-found: error
